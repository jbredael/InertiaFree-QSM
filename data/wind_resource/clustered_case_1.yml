metadata:
  name: Case study 1 Bangor Erris ERA5 Wind Profile Clustering
  description: This dataset contains the results of clustering analysis performed
    on ERA5 reanalysis data for the Bangor Erris location in Ireland. The clustering
    was conducted to identify typical wind profile shapes and their probabilities
    based on the ERA5 data from 2010 to 2020, covering altitudes from 10 to 500 meters
    above ground level.
  note: ERA5 reanalysis data processed for wind profile clustering analysis
