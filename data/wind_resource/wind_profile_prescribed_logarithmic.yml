metadata:
  name: Prescribed Wind Profile
  description: Wind resource file with a prescribed analytical wind profile
  note: Profile shape prescribed analytically using a logarithmic profile (U(z) =
    (u*/kappa) * ln(z/z0)) with friction velocity u* = 0.4 m/s, roughness length z0
    = 0.03 m. No measured wind data was used. The wind speed probability distribution
    is a Weibull distribution with mean wind speed 10.0 m/s and shape factor k = 2.0
    (Weibull scale parameter lambda = 11.2838 m/s). u_normalized contains the prescribed
    profile normalised to 1 at 200 m; v_normalized is zero for all altitudes. The
    probability matrix has a single wind-direction bin (omnidirectional).
