metadata:
  name: Kitepower V3.20
  description: Config for the Kitepower V3.20 soft kite pumping ground gen system
  note: None
  awesIO_version: 0.1.0
  schema: system_schema.yml
assembly:
  airborne_type: soft_kite
  generation_type: pumping_ground_gen
components:
  wing:
    name: Kitepower V3.20
    type: LEI_soft_kite
    version: 1.0
    structure:
      projected_surface_area: 19.75 # m2
      mass: 22.8 # kg, all mass lumped in the wing for simplicity
  bridle:
    name: Kitepower V3.20 Bridle
    type: LEI_soft_kite_bridle 
    version: 1.0
    structure:
      mass: 0
  control_system:
    name: Kitepower V3.20 KCU
    type: kite_control_unit
    version: 1.0
    structure:
      mass: 0
  tether:
    name: Kitepower V3.20
    type: non_conductive_tether
    version: 1.0
    structure:
      length: 340
      diameter: 0.010
      density: 724.0
      max_tether_force: 5000.0 # N
      conductive: false
      material:
        type: dyneema
        youngs_modulus: 0.85e9 # Pa
  ground_station:
    name: example_pumping_ground_gen_station
    type: pumping_ground_gen_station
    version: 1.0
    structure:
      mass: 0.0
    drum:
      type: electric_winch
      max_tether_speed: 10.0
    generator:
      type: permanent_magnet_synchronous
      max_power: 10000.0 # W
      efficiency: 1
    storage:
      type: battery_bank
      capacity: 100000.0 # Wh
      max_charge_rate: 50000.0 # W
      max_discharge_rate: 50000.0 # W
      efficiency: 1
      state_of_charge_initial: 0.5
