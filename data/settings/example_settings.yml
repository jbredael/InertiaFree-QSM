# Simulation settings for the inertia-free quasi-steady model
# All angles are in degrees

# ============================================================================
# AERODYNAMIC SETTINGS
# ============================================================================
aerodynamics: # TU Delft V3
  kite_lift_coefficient_reel_out: 0.63
  kite_drag_coefficient_reel_out: 0.14
  kite_lift_coefficient_reel_in: 0.4 
  kite_drag_coefficient_reel_in: 0.12
  tether_drag_coefficient: 1.1
# ============================================================================
# OPTIMIZATION SETTINGS
# ============================================================================
# Settings for the optimization-based power curve generation
# This method is slower but finds optimal cycle parameters for each wind speed

optimization:
  # Wind speed range for power curve calculation
  wind_speeds:
    # Minimum wind speed [m/s]
    cut_in: 3.0
    # Maximum wind speed [m/s]
    cut_out: 25.0
    # Number of points to calculate (determines spacing)
    n_points: 23

  # SLSQP optimizer configuration
  optimizer:
    # Control which variables are optimized (true) or fixed (false)
    optimize_variables:
      reeling_speed_traction: true
      reeling_speed_retraction: true
      fraction_tether_length_traction_end: true
      fraction_tether_length_retraction_end: true
      elevation_angle_traction: true
      elevation_angle_end_trans_rori: true

    # Time step for each phase during optimization (in seconds)
    # Final solution is computed with finer time steps from Phase Settings
    opt_phase_timestep:
      retraction: 1.5
      transition_riro: 0.05
      traction: 2.5
      transition_rori: 0.05

    # Maximum number of iterations per wind speed point
    max_iterations: 120
    # Function tolerance for convergence (absolute, in watts)
    ftol: 0.005
    # Fallback finite-difference step size in scaled variable space.
    eps: 1.0e-2
    # Preferred finite-difference steps in physical variable units.
    # These avoid using an overly large tether-fraction step while keeping
    # speed and angle gradients above simulation noise.
    finite_difference_steps:
      reeling_speed: 0.03      # m/s
      tether_fraction: 0.005   # -
      elevation_angle: 0.25    # deg
    # Optimizer starting point: [reeling_speed_out, reeling_speed_in,
    #   fraction_tether_length_retraction_end, fraction_tether_length_traction_end,
    #   elevation_angle_traction (degrees, applied equally to all N points in the array),
    #   elevation_angle_end_trans_rori (degrees)]
    x0: [2, -2, 0.65, 0.9, 30.0, 50.0]
    # Variable scaling factors — convention: x_scaled = x / scaling
    scaling: [1, 1, 1, 1, 30, 30]
  # Optimizer bounds (where not derived from system properties)
  bounds:
    # Reeling speed bounds for traction and retraction phases
    reeling_speed_traction_min: 0.01
    reeling_speed_traction_max: 15.0
    reeling_speed_retraction_min: -15.0
    reeling_speed_retraction_max: -0.01

    # Tether length bounds as fractions of max_tether_length
    fraction_tether_length_traction_end_min: 0.8
    fraction_tether_length_traction_end_max: 0.95
    fraction_tether_length_retraction_end_min: 0.2
    fraction_tether_length_retraction_end_max: 0.8

    # Elevation angle bounds for traction phase [degrees]
    elevation_angle_traction_min: 30.0
    elevation_angle_traction_max: 60.0

    # Elevation angle bounds for RORI transition phase end [degrees]
    elevation_angle_end_trans_rori_min: 30.0
    elevation_angle_end_trans_rori_max: 80.0
  

  # Optimizer constraints
  constraints:
    # Minimum difference between retraction start and end tether length fractions [-]
    # Ensures the cycle reels in a meaningful amount of tether:
    #   frac_start - frac_end >= min_tether_length_fraction_difference
    min_tether_length_fraction_difference: 0.1
    # Maximum allowed difference in elevation angle between steps (degrees)
    max_difference_elevation_angle_steps: 10.0
    

# ============================================================================
# CYCLE CONFIGURATION
# ============================================================================
# Cycle parameters for simulation

cycle:
  minimum_tether_force: 750.0 # Minimum tether force (N)

  minimum_height: 100.0 # Minimum height of the kite during the cycle (m)

  # Number of elements in this array determines the number of points in the elevation angle profile during traction phase.
  elevation_angle_traction: [30.0, 30.0, 30.0, 30.0, 30.0]

  # Tether length at end of traction phase as fraction of max tether length [-]
  # (= start of RORI transition; must be < 1.0 to leave reel-out headroom)
  tether_length_end_traction: 0.95

  # Tether length at end of retraction as fraction of max tether length [-]
  tether_length_end_retraction: 0.6

  # Include transition phase energy in cycle energy calculation
  include_transition_energy: true

  # Prescribed elevation angle at which the RORI transition phase ends and retraction begins [degrees]
  elevation_angle_end_trans_rori: 50.0


# ============================================================================
# PHASE SETTINGS
# ============================================================================
# Parameters for each phase of the pumping cycle

retraction:
  # Control setting:
  #   [control_parameter, setpoint_value]
  #   or [control_parameter, setpoint_value]
  # Options: 'tether_force_ground', 'tether_force_kite', 'reeling_factor', 'reeling_speed'
  # Speed-controlled reel-in followed by force-control when the lower limit is reached.
  control: ['reeling_speed', -2.0]
  # Time step for simulation [s]
  time_step: 0.25
  # Azimuth angle [degrees]
  azimuth_angle: 0.0
  # Course angle [degrees]
  course_angle: 180.0

transition_riro:
  # Control setting for Reel-In to Reel-Out (RIRO) transition phase
  control: ['reeling_speed', 0]
  # Time step for simulation [s]
  time_step: 0.05
  # Azimuth angle [degrees]
  azimuth_angle: 0.0
  # Course angle [degrees]
  course_angle: 0.0

transition_rori:
  # Control setting for Reel-Out to Reel-In transition phase.
  # The kite is powered. Reels out when force is too high, reels in when force is too low.
  control: ['reeling_speed', 0]
  # Time step for simulation [s]
  time_step: 0.05
  # Azimuth angle [degrees]
  azimuth_angle: 0.0
  # Course angle [degrees]
  course_angle: 180.0

traction:
  # Control setting for traction phase:
  #   [control_parameter, setpoint_value]
  #   or [control_parameter, setpoint_value]
  control: ['reeling_speed', 2.0]
  # Time step for simulation [s]
  time_step: 0.25
  # Azimuth angle [degrees]
  azimuth_angle: 11.5
  # Course angle [degrees]
  course_angle: 93.0

# ============================================================================
# STEADY STATE SOLVER SETTINGS
# ============================================================================
# Configuration for the iterative steady-state solver in the QSM

steady_state:
  # Maximum iterations for the kinematic ratio convergence loop
  max_iterations: 250
  # Normalized lift-to-drag error tolerance for convergence [-]
  convergence_tolerance: 1.0e-3

# ============================================================================
# PHASE SOLVER SETTINGS
# ============================================================================
# Numerical settings for the phase-level simulation

phase_solver:
  # Maximum number of time points before terminating a phase simulation
  max_time_points: 5000
